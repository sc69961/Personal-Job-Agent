<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Job Agent Dashboard</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0d1117; color: #c9d1d9;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px;
            padding: 40px; text-align: center; max-width: 480px; }
    h1 { font-size: 28px; margin: 0 0 12px; }
    p { color: #8b949e; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎯 Job Agent</h1>
    <p>Dashboard will appear here after the first scheduled run.</p>
    <p style="font-size:13px;color:#6e7681;">Runs daily at 6:30 AM Mountain Time</p>
  </div>
</body>
</html>
