name: Job Agent — Daily Run

on:
  schedule:
    - cron: '30 12 * * *'   # 6:30 AM MT daily
  workflow_dispatch:
    inputs:
      force_email:
        description: 'Force email even if already sent today'
        required: false
        default: 'false'
        type: boolean

# CONCURRENCY GUARD
# Only one job-agent run executes at a time. If a scheduled run and a manual
# run overlap, the second waits in a queue (cancel-in-progress: false) rather
# than both racing to push to the same branch. This eliminates the most common
# cause of git lock conflicts — two concurrent runs both writing data files.
concurrency:
  group: job-agent-main
  cancel-in-progress: false

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # needed to git-push persistent data files

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure directories exist
        run: mkdir -p output public config

      - name: Decode Google credentials
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 -d > config/google_credentials.json

      # Restore output cache AND OAuth token from previous run.
      # The token gets refreshed + saved back to disk each run, so the cache
      # always holds the most recent valid token — no manual Secret updates needed.
      - name: Restore state cache (output + OAuth token)
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: |
            output/
            config/google_token.pickle
          key: job-agent-state-${{ github.run_id }}
          restore-keys: |
            job-agent-state-

      # Only decode from Secret on first run (cache miss) or if cache has expired
      - name: Decode Google OAuth token (cache miss fallback)
        if: steps.restore-state.outputs.cache-hit != 'true'
        run: echo "${{ secrets.GOOGLE_TOKEN_PICKLE }}" | base64 -d > config/google_token.pickle

      - name: Run Job Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: stevechristian-job-agent
          AWS_REGION: us-east-2
          FORCE_EMAIL: ${{ github.event.inputs.force_email }}
        run: python main.py --headless

      # Save state AFTER the run — token may have been refreshed by the agent
      - name: Save state cache (output + refreshed OAuth token)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            output/
            config/google_token.pickle
          key: job-agent-state-${{ github.run_id }}

      # Commit key data files to the repo so they survive GitHub Actions cache expiry.
      # first_seen_registry: prevents job dates resetting on cache wipe
      # rejected_jobs: performance log (filtered/low-score history)
      # market_stats: historical PM role trend data for Market Intel tab
      # [skip ci] prevents this commit from re-triggering the workflow.
      # git_safe_push.sh handles stale lock cleanup and push retry automatically.
      - name: Persist data files to repo
        run: |
          bash scripts/git_safe_push.sh \
            "output/first_seen_registry.json output/rejected_jobs.json output/market_stats.json" \
            "chore: update job agent data [skip ci]"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting:jobs --token "${{ secrets.FIREBASE_TOKEN }}" || true

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-agent-logs-${{ github.run_id }}
          path: output/job_agent.log
          retention-days: 14
