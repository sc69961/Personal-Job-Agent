name: Job Agent — Daily Run

on:
  schedule:
    - cron: '30 12 * * *'   # 6:30 AM MT daily
  workflow_dispatch:

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure directories exist
        run: mkdir -p output public config

      - name: Decode Google credentials
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 -d > config/google_credentials.json

      # Restore output cache AND OAuth token from previous run.
      # The token gets refreshed + saved back to disk each run, so the cache
      # always holds the most recent valid token — no manual Secret updates needed.
      - name: Restore state cache (output + OAuth token)
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: |
            output/
            config/google_token.pickle
          key: job-agent-state-${{ github.run_id }}
          restore-keys: |
            job-agent-state-

      # Only decode from Secret on first run (cache miss) or if cache has expired
      - name: Decode Google OAuth token (cache miss fallback)
        if: steps.restore-state.outputs.cache-hit != 'true'
        run: echo "${{ secrets.GOOGLE_TOKEN_PICKLE }}" | base64 -d > config/google_token.pickle

      - name: Run Job Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py --headless

      # Save state AFTER the run — token may have been refreshed by the agent
      - name: Save state cache (output + refreshed OAuth token)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            output/
            config/google_token.pickle
          key: job-agent-state-${{ github.run_id }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting:jobs --token "${{ secrets.FIREBASE_TOKEN }}" || true

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-agent-logs-${{ github.run_id }}
          path: output/job_agent.log
          retention-days: 14
