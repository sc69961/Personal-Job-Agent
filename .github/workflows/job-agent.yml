name: Job Agent — Daily Run

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore output cache
        uses: actions/cache@v4
        with:
          path: output/
          key: job-agent-output-${{ github.run_id }}
          restore-keys: |
            job-agent-output-

      - name: Ensure directories exist
        run: mkdir -p output public

      - name: Decode Google credentials
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 -d > config/google_credentials.json

      - name: Decode Google OAuth token
        run: echo "${{ secrets.GOOGLE_TOKEN_PICKLE }}" | base64 -d > config/google_token.pickle

      - name: Debug file structure
        run: |
          echo "Working directory: $(pwd)"
          ls -la config/
          python -c "import sys; sys.path.insert(0, '.'); from config.config import ANTHROPIC_API_KEY; print('config import OK')"

      - name: Run Job Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --headless

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting:jobs --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-agent-logs-${{ github.run_id }}
          path: output/job_agent.log
          retention-days: 14